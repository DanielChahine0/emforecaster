job_name: "aryan/emforecaster"

#now i have to add global. to all coz of the main.py global config thing

ablations:
  global.exp.project_name: ["aryan/emforecaster"]
  global.data.dataset:
    ["rf_emf_det", "rf_emf_ptv", "rf_emf_ptv2", "rf_emf_tur", "rf_emf"]
  global.exp.patch_model_id: ["TSMixer"]
  global.data.num_channels: [1]
  global.tsmixer.dropout: [0.3]
  global.data.seq_len: [336]
  global.data.pred_len: [96, 192, 336, 512]
  global.sl.scheduler: ["onecycle"]
  global.sl.lr: [0.0001]
  global.sl.patch_norm: ["none"]
  global.sl.patch_act: ["gelu"]
  global.exp.backbone_id: ["Linear"]
  global.tsmixer.num_enc_layers: [1, 2]
  global.tsmixer.d_model: [128, 256, 512]
  global.data.patch_dim: [8]
  global.data.patch_stride: [-1]
  global.sl.patch_embed_dim: [256, 512]
  global.sl.pos_enc: ["none"]
  global.dlinear.final_moving_avg: [25]
  global.sl.independent_patching: [False]
  global.sl.batch_size: [512]
  global.exp.gpu_id: [0]

  # Conformal prediction
  global.conf.conf: [True]
  global.conf.alpha: [0.01]
  global.conf.corrected: [True]
